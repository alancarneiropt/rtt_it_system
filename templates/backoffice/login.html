<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrar no Backoffice | RTT-IT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-200 font-sans min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg border border-slate-200 p-8">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">RTT-IT Backoffice</h1>
            <p class="text-sm text-slate-500 mt-1">Acesso restrito a administradores</p>
        </div>
        {% if erro %}
        <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
            {{ erro }}
        </div>
        {% endif %}
        <form method="post" action="">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="mb-4">
                <label for="id_email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" name="email" id="id_email" required autofocus
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    placeholder="admin@exemplo.com">
            </div>
            <div class="mb-6">
                <label for="id_palavra_passe" class="block text-sm font-medium text-slate-700 mb-1">Palavra-passe</label>
                <input type="password" name="palavra_passe" id="id_palavra_passe" required
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    placeholder="••••••••">
            </div>
            <button type="submit" class="w-full py-2.5 rounded-lg bg-slate-700 text-white font-medium hover:bg-slate-800">
                Entrar no Backoffice
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-slate-500">
            <a href="/" class="text-blue-600 hover:underline">Voltar ao site principal</a>
        </p>
    </div>
</body>
</html>
