{% extends "backoffice/base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'backoffice_departamento_list' %}" class="text-slate-600 hover:text-slate-800 text-sm">← Voltar à lista</a>
</div>
<h1 class="text-2xl font-bold text-slate-800 mb-6">{{ titulo }}</h1>
<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 max-w-lg">
    <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label for="id_nome" class="block text-sm font-medium text-slate-700 mb-1">{{ form.nome.label }}</label>
                {{ form.nome }}
                {% if form.nome.errors %}<p class="text-red-600 text-xs mt-1">{{ form.nome.errors.0 }}</p>{% endif %}
            </div>
            <div class="flex items-center gap-2">
                {{ form.ativo }}
                <label for="id_ativo" class="text-sm font-medium text-slate-700">{{ form.ativo.label }}</label>
            </div>
        </div>
        <div class="mt-6 flex gap-2">
            <button type="submit" class="px-4 py-2 rounded-lg bg-slate-700 text-white font-medium hover:bg-slate-800">Guardar</button>
            <a href="{% url 'backoffice_departamento_list' %}" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
