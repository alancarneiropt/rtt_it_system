# RTT-IT — app Docker + SQLite persistente.
# Monte um volume em /app/media (ex.: bind .../volumes/db -> /app/media).

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: rtt-it:latest
    ports:
      - "8009:8009"
    environment:
      DJANGO_PRODUCTION: "1"
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?defina no .env}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?defina no .env}
      SQLITE_PATH: ${SQLITE_PATH:-/app/media/db.sqlite3}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      USE_X_FORWARDED_PROTO: ${USE_X_FORWARDED_PROTO:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
    restart: unless-stopped
